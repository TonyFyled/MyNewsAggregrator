<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoVibe - Live News Aggregator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Fredoka", sans-serif;
            background: #f5f2e8;
            color: #000000;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            background: transparent;
            backdrop-filter: blur(10px);
            padding: 32px;
            text-align: center;
            border-bottom: 4px solid black;
            position: sticky;
            top: 0;
            z-index: 100;
            animation: slideDown 0.6s ease-out;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-indicator {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .logo {
            font-size: 50px;
            font-weight: 800;
            background: black;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.5)); }
            50% { filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.8)); }
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding-left: 10px;
            margin-top: 0.5rem;
            color: #10b981;
            font-size: 0.9rem;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            background: transparent;
            padding: 10px;
        }

        .nav-btn {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: 2px solid black;
            color: black;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            font-family: "Fredoka", sans-serif;
        }

        .nav-btn:hover {
            background: black;
            color: #f5f2e8;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        .nav-btn.active {
            background: black;
            color: #f5f2e8;
            border-color: transparent;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .section { display: none; animation: fadeIn 0.5s ease-in; }
        .section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 2rem;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .update-time { color: #9ca3af; font-size: 0.9rem; }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .news-card {
            background: transparent;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #2D3436;
            box-shadow: 6px 6px 0;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            animation: cardAppear 0.5s ease-out;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .news-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(99, 102, 241, 0.3);
            border-color: rgba(99, 102, 241, 0.5);
        }

        .news-card:hover::before { transform: scaleX(1); }

        .news-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2));
        }

        .news-content { padding: 1.5rem; }

        .news-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: #9ca3af;
        }

        .news-source {
            background: rgba(99, 102, 241, 0.2);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-weight: 600;
        }

        .news-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: black;
            line-height: 1.4;
        }

        .news-excerpt {
            color: #2D3436;
            line-height: 1.6;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-footer { display: flex; justify-content: space-between; align-items: center; }

        .read-more {
            color: #a855f7;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .read-more:hover { color: #ec4899; transform: translateX(5px); }

        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: #9ca3af;
        }

        .spinner {
            border: 4px solid rgba(99, 102, 241, 0.2);
            border-top: 4px solid #6366f1;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #b91c1c;
            padding: 1.5rem;
            border-radius: 12px;
            margin: 2rem 0;
            text-align: center;
            line-height: 1.8;
        }

        .error-message a { color: #a855f7; }

        .proxy-badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 6px;
            border: 1px solid #10b981;
            color: #10b981;
            margin-left: 8px;
            vertical-align: middle;
        }

        .refresh-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .refresh-btn:hover {
            transform: rotate(180deg) scale(1.1);
            box-shadow: 0 12px 30px rgba(99, 102, 241, 0.6);
        }

        @media (max-width: 768px) {
            .news-grid { grid-template-columns: 1fr; }
            .logo { font-size: 2rem; }
            .nav { gap: 0.5rem; }
            .nav-btn { padding: 0.5rem 1rem; font-size: 0.75rem; }
        }

        .trending-bar {
            border-bottom: 3px solid black;
            padding: 14px 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            background: #f5f2e8;
            overflow-x: auto;
        }

        .trending-label { font-weight: 700; white-space: nowrap; }

        .trending-tokens { display: flex; gap: 16px; white-space: nowrap; }

        .trending-token {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border: 2px solid black;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            opacity: 0;
            animation: popIn 0.4s ease forwards;
            font-family: "Fredoka", sans-serif;
        }

        .trending-token img { width: 18px; height: 18px; }

        .trending-token:hover {
            background: black;
            color: #f5f2e8;
            transform: translateY(-2px);
        }

        .trending-token .change.up { color: #16a34a; }
        .trending-token .change.down { color: #dc2626; }

        @keyframes popIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-indicator">
            <div class="logo">News Aggregator</div>
            <div class="live-indicator">
                <span class="live-dot"></span>
                <span>LIVE</span>
            </div>
        </div>
        <div class="nav">
            <button class="nav-btn active" data-section="all">All News</button>
            <button class="nav-btn" data-section="defi">DeFi</button>
            <button class="nav-btn" data-section="rwa">RWA</button>
            <button class="nav-btn" data-section="privacy">Privacy</button>
            <button class="nav-btn" data-section="etf">ETF</button>
            <button class="nav-btn" data-section="nft">NFT</button>
        </div>
    </div>

    <div class="trending-bar">
        <span class="trending-label">🔥 Trending Tokens:</span>
        <div class="trending-tokens" id="trending-tokens">Loading...</div>
        <div class="update-time" id="trending-update-time"></div>
    </div>

    <div class="container">
        <div class="section active" id="all">
            <div class="section-header">
                <h2 class="section-title">Latest Crypto News <span class="proxy-badge">via proxy</span></h2>
                <div class="update-time" id="all-update-time"></div>
            </div>
            <div class="news-grid" id="all-grid">
                <div class="loading"><div class="spinner"></div>Loading latest news...</div>
            </div>
        </div>

        <div class="section" id="defi">
            <div class="section-header">
                <h2 class="section-title">DeFi News</h2>
                <div class="update-time" id="defi-update-time"></div>
            </div>
            <div class="news-grid" id="defi-grid"></div>
        </div>

        <div class="section" id="rwa">
            <div class="section-header">
                <h2 class="section-title">Real World Assets (RWA)</h2>
                <div class="update-time" id="rwa-update-time"></div>
            </div>
            <div class="news-grid" id="rwa-grid"></div>
        </div>

        <div class="section" id="privacy">
            <div class="section-header">
                <h2 class="section-title">Privacy & Security</h2>
                <div class="update-time" id="privacy-update-time"></div>
            </div>
            <div class="news-grid" id="privacy-grid"></div>
        </div>

        <div class="section" id="etf">
            <div class="section-header">
                <h2 class="section-title">Crypto ETFs</h2>
                <div class="update-time" id="etf-update-time"></div>
            </div>
            <div class="news-grid" id="etf-grid"></div>
        </div>

        <div class="section" id="nft">
            <div class="section-header">
                <h2 class="section-title">NFT News</h2>
                <div class="update-time" id="nft-update-time"></div>
            </div>
            <div class="news-grid" id="nft-grid"></div>
        </div>
    </div>

    <button class="refresh-btn" onclick="refreshAllNews()" title="Refresh news">↻</button>

    <script>
        const NEWS_API_KEY = 'a7cde5cad800464f855d4b5e401a4b24';

        const categories = {
            all: 'cryptocurrency',
            defi: 'defi cryptocurrency',
            rwa: 'tokenization real world assets crypto RWA',
            privacy: 'privacy cryptocurrency blockchain',
            etf: 'bitcoin etf cryptocurrency ethereum',
            nft: 'nfts non-fungible token'
        };

        let newsCache = {};
        const UPDATE_INTERVAL = 900000;

        // ─── CORS PROXY CONFIG ────────────────────────────────────────────────
        // Three proxies tried in order — if one fails, the next kicks in.
        // allorigins wraps the response in { contents: "..." } so we parse that.
        const PROXIES = [
            {
                build: (url) => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
                parse: async (res) => {
                    const wrapper = await res.json();
                    return JSON.parse(wrapper.contents);
                }
            },
            {
                build: (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
                parse: async (res) => res.json()
            },
            {
                build: (url) => `https://thingproxy.freeboard.io/fetch/${url}`,
                parse: async (res) => res.json()
            }
        ];

        async function fetchWithProxy(targetUrl) {
            for (const proxy of PROXIES) {
                try {
                    const res = await fetch(proxy.build(targetUrl), { signal: AbortSignal.timeout(8000) });
                    if (!res.ok) continue;
                    const data = await proxy.parse(res);
                    return data;
                } catch (err) {
                    console.warn(`Proxy failed, trying next...`, err.message);
                }
            }
            throw new Error('All proxies failed');
        }
        // ─────────────────────────────────────────────────────────────────────

        function getRelativeTime(date) {
            const now = new Date();
            const diffMs = now - new Date(date);
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            return `${diffDays}d ago`;
        }

        function createNewsCard(article) {
            const imgUrl = article.urlToImage || `https://images.unsplash.com/photo-1639762681485-074b7f938ba0?w=600&q=80`;
            const description = article.description || article.content || 'Read more at the source...';
            const safeTitle = article.title.replace(/"/g, '&quot;');
            return `
                <div class="news-card" onclick="window.open('${article.url}', '_blank')">
                    <img src="${imgUrl}" alt="${safeTitle}" class="news-image"
                         onerror="this.src='https://images.unsplash.com/photo-1639762681485-074b7f938ba0?w=600&q=80'">
                    <div class="news-content">
                        <div class="news-meta">
                            <span class="news-source">${article.source.name}</span>
                            <span>${getRelativeTime(article.publishedAt)}</span>
                        </div>
                        <h3 class="news-title">${article.title}</h3>
                        <p class="news-excerpt">${description}</p>
                        <div class="news-footer">
                            <a href="${article.url}" target="_blank" class="read-more" onclick="event.stopPropagation()">
                                Read More →
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        async function fetchNews(category) {
            const query = categories[category];
            const targetUrl = `https://newsapi.org/v2/everything?q=${encodeURIComponent(query)}&sortBy=publishedAt&language=en&pageSize=20&apiKey=${NEWS_API_KEY}`;

            try {
                const data = await fetchWithProxy(targetUrl);
                if (data.status === 'ok' && data.articles) {
                    return data.articles.filter(a => a.title && a.url && a.title !== '[Removed]');
                }
                console.error('API error:', data.message);
                return [];
            } catch (err) {
                console.error('All proxies exhausted:', err);
                return [];
            }
        }

        async function loadCategoryNews(category) {
            const grid = document.getElementById(`${category}-grid`);
            const updateTime = document.getElementById(`${category}-update-time`);
            grid.innerHTML = '<div class="loading"><div class="spinner"></div>Loading news...</div>';

            const articles = await fetchNews(category);

            if (articles.length > 0) {
                newsCache[category] = articles;
                grid.innerHTML = articles.map(createNewsCard).join('');
                updateTime.textContent = `Updated ${new Date().toLocaleTimeString()}`;
            } else {
                grid.innerHTML = `
                    <div class="error-message">
                        ⚠️ Could not load news. All CORS proxies failed or the API key is invalid.<br><br>
                        <strong>Quick fixes:</strong><br>
                        1. Check your API key at <a href="https://newsapi.org" target="_blank">newsapi.org</a><br>
                        2. NewsAPI free tier blocks browser requests — consider upgrading or switching to
                        <a href="https://gnews.io" target="_blank">GNews API</a> (browser-friendly free tier)<br>
                        3. Or deploy a tiny backend proxy (Node/Express, Cloudflare Worker)
                    </div>
                `;
            }
        }

        async function refreshAllNews() {
            const activeSection = document.querySelector('.section.active').id;
            newsCache[activeSection] = null;
            await loadCategoryNews(activeSection);
        }

        // Navigation
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const section = btn.dataset.section;
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.getElementById(section).classList.add('active');
                if (!newsCache[section]) await loadCategoryNews(section);
            });
        });

        setInterval(() => {
            const activeSection = document.querySelector('.section.active').id;
            loadCategoryNews(activeSection);
        }, UPDATE_INTERVAL);

        // ─── TRENDING TOKENS (CoinGecko — no CORS issues) ────────────────────
        async function loadTrendingTokens() {
            try {
                const res = await fetch("https://api.coingecko.com/api/v3/search/trending");
                const data = await res.json();
                const container = document.getElementById("trending-tokens");
                container.innerHTML = "";

                data.coins.slice(0, 7).forEach(({ item }, i) => {
                    const el = document.createElement("div");
                    el.className = "trending-token";
                    el.style.animationDelay = `${i * 60}ms`;
                    el.onclick = () => window.open(`https://www.coingecko.com/en/coins/${item.id}`, "_blank");

                    const change = item.data?.price_change_percentage_24h?.usd;
                    const changeClass = change >= 0 ? "up" : "down";
                    const changeText = typeof change === "number"
                        ? `${change >= 0 ? "+" : ""}${change.toFixed(2)}%` : "—";

                    el.innerHTML = `
                        <img src="${item.small}" alt="${item.name}">
                        <span>${item.symbol.toUpperCase()}</span>
                        <span class="change ${changeClass}">${changeText}</span>
                    `;
                    container.appendChild(el);
                });

                document.getElementById("trending-update-time").textContent =
                    `Updated ${new Date().toLocaleTimeString()}`;
            } catch (err) {
                document.getElementById("trending-tokens").textContent = "Unable to load trending tokens";
            }
        }

        loadTrendingTokens();
        setInterval(loadTrendingTokens, 5 * 60 * 1000);

        // Initial load
        loadCategoryNews('all');
    </script>
</body>
</html>
